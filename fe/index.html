<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sistem Informasi Penjualan</title>
  <link rel="icon" href="./assets/img/favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font@6.x/css/materialdesignicons.min.css" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0f172a;
      padding: 24px;
    }

    .portal {
      width: min(760px, 100%);
      background: white;
      border: 1px solid #eeeeee;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 18px 50px rgba(17, 24, 39, 0.06);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .logo {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #e85d4f, #c2372f);
      color: white;
      font-size: 23px;
      box-shadow: 0 10px 22px rgba(194, 55, 47, 0.18);
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      color: #1f2937;
      letter-spacing: 0;
    }

    p {
      margin: 6px 0 0;
      color: #64748b;
      font-size: 14px;
      line-height: 1.55;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .entry {
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 18px;
      text-decoration: none;
      color: inherit;
      transition: 0.2s ease;
      min-height: 138px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
      background: #ffffff;
    }

    .entry:hover {
      transform: translateY(-2px);
      border-color: #c2372f;
      box-shadow: 0 12px 26px rgba(194, 55, 47, 0.10);
    }

    .entry-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .entry-icon {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #c2372f;
      background: #fde8e7;
      font-size: 12px;
      font-weight: 900;
    }

    .entry-title {
      font-size: 18px;
      font-weight: 800;
      color: #0f172a;
    }

    .entry-action {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #c2372f;
      font-size: 14px;
      font-weight: 800;
    }

    @media (max-width: 720px) {
      body {
        padding: 16px;
      }

      .portal {
        padding: 20px;
        border-radius: 14px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 21px;
      }

      .entry {
        min-height: 124px;
      }
    }
  </style>
</head>

<body>
  <main class="portal">
    <div class="brand">
      <div class="logo">
        <span class="mdi mdi-noodles"></span>
      </div>
      <div>
        <h1>Sistem Informasi Penjualan</h1>
        <p>Warung Bakso Tulus</p>
      </div>
    </div>

    <div class="grid">
      <a class="entry" href="./admin/">
        <div>
          <div class="entry-head">
            <div class="entry-icon">AD</div>
            <div class="entry-title">Admin</div>
          </div>
          <p>Login pemilik usaha untuk mengelola dashboard, pesanan, transaksi, menu, dan laporan penjualan.</p>
        </div>
        <div class="entry-action">Masuk Admin <span>-&gt;</span></div>
      </a>

      <a class="entry" href="./pelanggan/">
        <div>
          <div class="entry-head">
            <div class="entry-icon">QR</div>
            <div class="entry-title">Pelanggan</div>
          </div>
          <p>Akses menu digital, tambah pesanan, dan tracking status pesanan tanpa login admin.</p>
        </div>
        <div class="entry-action">Buka Menu Pelanggan <span>-&gt;</span></div>
      </a>
    </div>
  </main>
</body>

</html>
