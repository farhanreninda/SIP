<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sistem Penjualan</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font@6.x/css/materialdesignicons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/vuetify@2.6.14/dist/vuetify.min.css" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/vuetify@2.6.14/dist/vuetify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>

<div id="app">
<v-app>

<!-- LOGIN -->
<login-page v-if="!isLogin" @login-success="onLogin"></login-page>

<!-- MAIN APP -->
<div v-else class="app-layout">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="logo-box">
      <div class="logo">SIP</div>
      <div class="app-name">Sistem Informasi Penjualan</div>
    </div>

    <div class="menu">
      <div class="menu-item" :class="{active:page==='dashboard'}" @click="page='dashboard'">
        <v-icon left>mdi-view-dashboard</v-icon> Dashboard
      </div>

      <div class="menu-item" :class="{active:page==='product'}" @click="page='product'">
        <v-icon left>mdi-package-variant</v-icon> Produk
      </div>

      <div class="menu-item" :class="{active:page==='transaction'}" @click="page='transaction'">
        <v-icon left>mdi-receipt</v-icon> Transaksi
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="menu-item" @click="logout">
        <v-icon left>mdi-logout</v-icon> Logout
      </div>
    </div>

  </div>

  <!-- CONTENT -->
  <div class="main-content">

    <!-- TOP BAR -->
    <!-- <div class="topbar">
      <input class="search" placeholder="Search..." />

      <div class="user">
        <v-icon>mdi-bell-outline</v-icon>

        <v-avatar size="32" class="ml-3"></v-avatar>
        <span class="ml-2">{{ user.username }}</span>
      </div>
    </div> -->

    <!-- PAGE -->
    <dashboard-page v-if="page==='dashboard'"></dashboard-page>
    <product-page v-if="page==='product'"></product-page>
    <transaction-page v-if="page==='transaction'"></transaction-page>

  </div>

</div>

</v-app>
</div>

<script>
window.API_BASE_URL = 'http://localhost:3000'
</script>

<script src="./js/services/api.js"></script>
<script src="./js/notify.js"></script>
<script src="./js/confirm.js"></script>
<script src="./js/components/login.js"></script>
<script src="./js/components/product.js"></script>
<script src="./js/components/transaction.js"></script>
<script src="./js/components/dashboard.js"></script>

<script>
new Vue({
  el:'#app',
  vuetify: new Vuetify({}),
  data:{
    isLogin:false,
    page:'dashboard',
    user:null
  },
  created(){
    const u = localStorage.getItem('currentUser')
    if(u){
      this.user = JSON.parse(u)
      this.isLogin = true
    }
  },
  methods:{
    onLogin(user){
      this.user = user
      this.isLogin = true
    },
    logout(){
      localStorage.removeItem('currentUser')
      this.user=null
      this.isLogin=false
    }
  }
})
</script>

</body>
</html>
